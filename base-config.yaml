port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: false
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
unified-delay: false

sniffer:
  sniff:
    TLS: {ports: [443], override-destination: true}
    HTTP: {ports: [443], override-destination: true}
  enable: true
  parse-pure-ip: false
  force-dns-mapping: true
  override-destination: true

ipv6: false

clash-for-android:
  append-system-dns: false

experimental:
  sniff-tls-sni: true

